name: Build Media Editor APK

on:
  push:
    branches: [main, claude/photo-video-editor-4v9gpq]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to publish the rolling Release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pin Gradle 8.7 to match AGP 8.2.x (the runner's default is too new).
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: >
          gradle :app:assembleDebug --stacktrace --no-daemon
          -PversionCode=${{ github.run_number }}
          -PversionName=1.0.${{ github.run_number }}

      - name: Stage APK with a friendly name
        run: cp app/build/outputs/apk/debug/app-debug.apk neversoft-media-editor.apk

      - name: Upload APK artifact (per-run, expires)
        uses: actions/upload-artifact@v4
        with:
          name: neversoft-media-editor-apk
          path: neversoft-media-editor.apk
          if-no-files-found: error

      # Permanent, stable download URL so the App Center can list and update it.
      - name: Publish APK to rolling Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NeverSoft Media Editor (latest build)
          prerelease: true
          body: |
            NeverSoft Media Editor — a fast, instant-import photo & video editor.
            Built from commit ${{ github.sha }} (build ${{ github.run_number }}).
            Download `neversoft-media-editor.apk` below.

            versionCode:${{ github.run_number }}
          files: neversoft-media-editor.apk
